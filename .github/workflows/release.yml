name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            ext: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            ext: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      # Strip debug symbols from Linux and macOS binaries to reduce archive size.
      - name: Strip binary (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: strip target/${{ matrix.target }}/release/demu

      # Package Linux and macOS archives as .tar.gz
      - name: Package archive (Linux/macOS)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          STAGING="demu-${VERSION}-${{ matrix.target }}"
          mkdir -p "${STAGING}"
          cp target/${{ matrix.target }}/release/demu "${STAGING}/"
          cp README.md LICENSE "${STAGING}/"
          tar czf "${STAGING}.tar.gz" "${STAGING}/"

      # Package the Windows archive as .zip using PowerShell's built-in Compress-Archive.
      - name: Package archive (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $VERSION = $env:GITHUB_REF_NAME -replace '^v', ''
          $STAGING = "demu-${VERSION}-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $STAGING | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\demu.exe" $STAGING\
          Copy-Item README.md, LICENSE $STAGING\
          Compress-Archive -Path $STAGING -DestinationPath "${STAGING}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: demu-${{ matrix.target }}
          path: demu-*.${{ matrix.ext }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # Write permission is required to create the GitHub Release and attach assets.
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: demu-*
          generate_release_notes: true

  publish:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Verify that the git tag matches the version declared in Cargo.toml.
      # This prevents accidental publishes when the two are out of sync.
      - name: Verify tag matches Cargo.toml version
        shell: bash
        run: |
          CARGO_VERSION=$(cargo metadata --no-deps --format-version 1 \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['packages'][0]['version'])")
          TAG_VERSION=${GITHUB_REF_NAME#v}
          if [ "${CARGO_VERSION}" != "${TAG_VERSION}" ]; then
            echo "Version mismatch: Cargo.toml has '${CARGO_VERSION}' but tag is '${GITHUB_REF_NAME}' (expected '${TAG_VERSION}')"
            exit 1
          fi
          echo "Version check passed: ${CARGO_VERSION}"

      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
