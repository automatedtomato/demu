name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: tar.gz
          # aarch64 compiles natively on Apple Silicon runners (macos-latest).
          # Intel Mac users can run this binary via Rosetta 2.
          - target: aarch64-apple-darwin
            os: macos-latest
            ext: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: zip

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      # Verify the binary was produced before attempting to package it.
      # Catches silent build failures where cargo exits 0 but produces no output.
      - name: Verify binary exists (Linux/macOS)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: test -f target/${{ matrix.target }}/release/demu

      - name: Verify binary exists (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          if (-not (Test-Path "target\${{ matrix.target }}\release\demu.exe")) {
            Write-Error "Binary not found: target\${{ matrix.target }}\release\demu.exe"
            exit 1
          }

      # Strip debug symbols on Linux and macOS to reduce archive size.
      # Uses the platform's system `strip` (GNU strip on Linux, Apple strip on macOS).
      # Both handle their native architecture correctly. On macos-13 (Intel),
      # Apple's strip produces a valid x86_64 binary.
      - name: Strip binary (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: strip target/${{ matrix.target }}/release/demu

      # Package Linux and macOS binaries as .tar.gz archives.
      - name: Package archive (Linux/macOS)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          STAGING="demu-${VERSION}-${{ matrix.target }}"
          mkdir -p "${STAGING}"
          cp target/${{ matrix.target }}/release/demu "${STAGING}/"
          cp README.md LICENSE "${STAGING}/"
          tar czf "${STAGING}.tar.gz" "${STAGING}/"

      # Package the Windows binary as a .zip using PowerShell's Compress-Archive.
      # The Windows binary has a .exe extension which is handled explicitly here.
      - name: Package archive (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $VERSION = $env:GITHUB_REF_NAME -replace '^v', ''
          $STAGING = "demu-${VERSION}-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $STAGING | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\demu.exe" $STAGING\
          Copy-Item README.md, LICENSE $STAGING\
          Compress-Archive -Path $STAGING -DestinationPath "${STAGING}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: demu-${{ matrix.target }}
          path: demu-*.${{ matrix.ext }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # Scoped to this job only — no other job needs write access to repo contents.
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e  # v4.2.1
        with:
          # Flatten all artifacts into the working directory so the demu-* glob
          # matches archives directly (not inside per-target subdirectories).
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c062e08bd532815e2082a7e09ce9f67414337ee0  # v2.2.1
        with:
          files: |
            demu-*.tar.gz
            demu-*.zip
          generate_release_notes: true

  publish:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Fail immediately with a clear message if the registry token is not
      # configured, rather than letting cargo produce a generic auth error.
      # The secret is assigned to a step-level env var so it is never
      # interpolated directly into the shell source via ${{ }}.
      - name: Verify registry token is set
        env:
          TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        shell: bash
        run: |
          if [ -z "${TOKEN}" ]; then
            echo "::error::CARGO_REGISTRY_TOKEN secret is not set. Add it at Settings > Secrets > Actions before publishing."
            exit 1
          fi

      # Verify the git tag matches the version in Cargo.toml to prevent
      # accidentally publishing the wrong version. Uses grep+sed to avoid
      # a Python dependency.
      - name: Verify tag matches Cargo.toml version
        shell: bash
        run: |
          CARGO_VERSION=$(grep '^version =' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          TAG_VERSION=${GITHUB_REF_NAME#v}
          if [ "${CARGO_VERSION}" != "${TAG_VERSION}" ]; then
            echo "::error::Version mismatch: Cargo.toml has '${CARGO_VERSION}' but tag is '${GITHUB_REF_NAME}' (expected '${TAG_VERSION}'). Bump the version in Cargo.toml before tagging."
            exit 1
          fi
          echo "Version check passed: ${CARGO_VERSION}"

      # Dry-run first to catch packaging errors (missing files, bad metadata)
      # without consuming the version slot on crates.io.
      - name: Publish dry-run
        run: cargo publish --dry-run

      # Pass the token via environment variable so it never appears in the
      # process argument list or cargo's verbose log output.
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish
