services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      # Mount repo into container — edits on host are instantly visible
      - .:/app
      # Persist cargo registry and build cache across container restarts
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - target-cache:/app/target
    working_dir: /app
    stdin_open: true
    tty: true

volumes:
  cargo-registry:
  cargo-git:
  target-cache:
